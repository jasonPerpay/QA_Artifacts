<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perpay — Unified Lifecycle Lists</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --bg2:#f8f7f4;
  --bg3:#f0ede8;
  --border:rgba(0,0,0,0.10);
  --border2:rgba(0,0,0,0.20);
  --text:#181715;
  --text2:#6b6963;
  --text3:#9b9891;
  --accent:#378ADD;
  --green:#065f46;
  --green-bg:#d1fae5;
  --r:8px;
  --rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#191816;
    --bg2:#232220;
    --bg3:#2d2b28;
    --border:rgba(255,255,255,0.10);
    --border2:rgba(255,255,255,0.22);
    --text:#f2ede6;
    --text2:#a09c96;
    --text3:#6b6760;
    --green:#6ee7b7;
    --green-bg:#064e3b;
  }
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:28px 24px 48px;
  max-width:880px;
  margin:0 auto;
  font-size:14px;
  line-height:1.5;
}

/* ── Header ── */
.ph{display:flex;align-items:baseline;gap:10px;margin-bottom:22px;padding-bottom:16px;border-bottom:0.5px solid var(--border)}
.pt{font-size:17px;font-weight:500}
.ps{font-size:12px;color:var(--text2)}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:20px}
.tab{padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s,border-color .15s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}

/* ── Metrics ── */
.metrics{display:flex;gap:10px;margin-bottom:16px}
.mc{flex:1;padding:11px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r)}
.mc.fig{cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:background .15s;border-color:var(--border)}
.mc.fig:hover{background:var(--bg3)}
.ml{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:4px}
.mv{font-size:18px;font-weight:500}
.ms{font-size:11px;color:var(--text2);margin-top:2px}
.fig-icon{font-size:15px;margin-bottom:3px;color:var(--text2)}
.fig-cta{font-size:11px;color:var(--accent);margin-top:auto;padding-top:6px}

/* ── Distribution bar ── */
.dbar{display:flex;height:20px;border-radius:var(--r);overflow:hidden;margin-bottom:12px;gap:1px;cursor:default}
.ds{height:100%;flex-shrink:0;transition:opacity .1s}
.ds:hover{opacity:.78}

/* ── Legend ── */
.leg{display:flex;flex-wrap:wrap;gap:8px 12px;margin-bottom:18px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);cursor:default}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lv{color:var(--text);font-weight:500}

/* ── Stage cards ── */
.stages{display:flex;flex-direction:column;gap:4px}
.sc{border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden}
.sh{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;user-select:none;transition:background .1s}
.sh:hover{background:var(--bg2)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sname{font-size:13px;font-weight:500;flex:1}
.scnt{font-size:12px;color:var(--text2)}
.schev{font-size:9px;color:var(--text3);transition:transform .18s;margin-left:6px}
.sc.open .schev{transform:rotate(90deg)}
.sb{display:none;padding:10px 13px 14px;border-top:0.5px solid var(--border);background:var(--bg2)}
.sc.open .sb{display:block}
.fl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-top:10px;margin-bottom:3px}
.fl:first-child{margin-top:0}
.fv{font-size:12px;line-height:1.6;color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;background:var(--green-bg);color:var(--green);margin-top:8px}
.ilink{font-size:11px;color:var(--accent);text-decoration:none;margin-top:8px;margin-left:10px}
.ilink:hover{text-decoration:underline}
.fr{display:flex;align-items:center;flex-wrap:wrap}

/* ── Coverage check ── */
.cov-wrap{margin-top:10px;padding:8px 13px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cov-l{font-size:11px;color:var(--text2)}
.cov-r{display:flex;align-items:center;gap:8px}

/* ── QA Section ── */
.qa-wrap{margin-top:14px}
.qa-toggle{width:100%;text-align:left;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:9px 13px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);display:flex;justify-content:space-between;align-items:center;transition:background .1s,color .1s}
.qa-toggle:hover{background:var(--bg3);color:var(--text)}
.qa-body{display:none;margin-top:4px;border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.qa-body.open{display:block}
.qa-group{padding:10px 13px 12px;border-bottom:0.5px solid var(--border);background:var(--bg)}
.qa-group:last-child{border-bottom:none}
.qa-gh{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:7px}
.qt{width:100%;border-collapse:collapse;font-size:11px;line-height:1.45}
.qt td{padding:3px 10px 3px 0;vertical-align:top}
.qt td:first-child{color:var(--text2);font-weight:500;white-space:nowrap;width:32%}
.qt td:nth-child(2){width:24px;white-space:nowrap}
.qt td:nth-child(3){color:var(--text)}

/* ── Tooltip ── */
#tt{
  position:fixed;display:none;
  background:var(--bg);
  border:0.5px solid var(--border2);
  border-radius:var(--r);
  padding:9px 13px;
  font-size:11px;
  z-index:9999;
  pointer-events:none;
  box-shadow:0 2px 12px rgba(0,0,0,0.12);
  min-width:170px;
}
.ttn{font-size:12px;font-weight:500;margin-bottom:7px;padding-bottom:7px;border-bottom:0.5px solid var(--border)}
.ttr{display:flex;justify-content:space-between;gap:18px;margin-top:3px}
.ttl{color:var(--text2)}
.ttv{font-weight:500;color:var(--text)}
</style>
</head>

/* ── Helpers ── */
function fmt(n){return n.toLocaleString()}
function pct(n,b,d=1){return((n/b)*100).toFixed(d)+'%'}
function pctSmart(n,b){
  const v=(n/b)*100;
  if(v<0.001)return v.toFixed(5)+'%';
  if(v<0.01)return v.toFixed(4)+'%';
  if(v<0.1)return v.toFixed(3)+'%';
  return v.toFixed(2)+'%';
}

/* ── Tooltip ── */
const tt=document.getElementById('tt');
function showTT(e,s,total){
  tt.innerHTML=`<div class="ttn">${s.name}</div>
    <div class="ttr"><span class="ttl">Users</span><span class="ttv">${fmt(s.count)}</span></div>
    <div class="ttr"><span class="ttl">% of sum</span><span class="ttv">${pct(s.count,total)}</span></div>
    <div class="ttr"><span class="ttl">% of active base</span><span class="ttv">${pctSmart(s.count,BASE)}</span></div>`;
  tt.style.display='block';
  moveTT(e);
}
function moveTT(e){
  let x=e.clientX+14,y=e.clientY-70;
  if(x+190>window.innerWidth)x=e.clientX-200;
  if(y<8)y=e.clientY+14;
  tt.style.left=x+'px';
  tt.style.top=y+'px';
}
function hideTT(){tt.style.display='none'}
document.addEventListener('mousemove',e=>{if(tt.style.display==='block')moveTT(e)});

/* ── Toggle ── */
function tog(id){document.getElementById(id).classList.toggle('open')}

/* ── QA helpers ── */
function togQA(key){
  const el=document.getElementById('qa-'+key);
  const chev=document.getElementById('qa-chev-'+key);
  el.classList.toggle('open');
  chev.textContent=el.classList.contains('open')?'▼':'▶';
}

function renderQA(p){
  if(!p.qa)return'';
  const total=p.qa.reduce((s,g)=>s+g.pairs.length,0);
  const groups=p.qa.map(g=>`<div class="qa-group">
    <div class="qa-gh">${g.group}</div>
    <table class="qt">${g.pairs.map(([pair,status,reason])=>`<tr><td>${pair}</td><td>${status}</td><td>${reason}</td></tr>`).join('')}</table>
  </div>`).join('');
  return `<div class="qa-wrap">
    <button class="qa-toggle" onclick="togQA('${p.key}')">
      <span>Mutual exclusivity QA — ${total} pairs · all clean</span>
      <span id="qa-chev-${p.key}" style="font-size:9px">▶</span>
    </button>
    <div class="qa-body" id="qa-${p.key}">${groups}</div>
  </div>`;
}

/* ── Render ── */
function render(p){
  const total=p.stages.reduce((s,x)=>s+x.count,0);
  const overlap=total-BASE;
  const oPct=pctSmart(Math.abs(overlap),BASE);

  const metrics=`<div class="metrics">
    <div class="mc">
      <div class="ml">Sum of lists</div>
      <div class="mv">${fmt(total)}</div>
    </div>
    <div class="mc">
      <div class="ml">Active user base</div>
      <div class="mv">${fmt(BASE)}</div>
      <div class="ms">Iterable profiles where is_active = true</div>
    </div>
    <div class="mc">
      <div class="ml">Delta (sum − base)</div>
      <div class="mv">${fmt(overlap)}</div>
      <div class="ms">${oPct} of base &nbsp;·&nbsp; ✓ noise</div>
    </div>
    <a class="mc fig" href="${p.figmaUrl}" target="_blank">
      <div class="fig-icon">◆</div>
      <div class="ml">Figma</div>
      <div class="ms">Lifecycle flowchart</div>
      <div class="fig-cta">View designs ↗</div>
    </a>
  </div>`;

  const dbar=`<div class="dbar" id="db-${p.key}">${
    p.stages.map((s,i)=>`<div class="ds" style="width:${((s.count/total)*100).toFixed(3)}%;background:${s.color}" data-pk="${p.key}" data-i="${i}"></div>`).join('')
  }</div>`;

  const leg=`<div class="leg">${
    p.stages.map(s=>`<div class="li"><div class="ld" style="background:${s.color}"></div><span>${s.name}</span><span class="lv">${fmt(s.count)}</span></div>`).join('')
  }</div>`;

  const cards=p.stages.map((s,i)=>{
    const cid=`${p.key}-${i}`;
    const pairsHtml=s.pairs?`<div class="qa-wrap">
      <button class="qa-toggle" onclick="togQA('sq-${cid}')">
        <span>Mutual exclusivity — ${s.pairs.length} pairs · all ✅</span>
        <span id="qa-chev-sq-${cid}" style="font-size:9px">▶</span>
      </button>
      <div class="qa-body" id="qa-sq-${cid}">
        <div class="qa-group">
          <table class="qt">${s.pairs.map(([pair,status,reason])=>`<tr><td>${pair}</td><td>${status}</td><td>${reason}</td></tr>`).join('')}</table>
        </div>
      </div>
    </div>`:'';
    return `<div class="sc" id="${cid}">
      <div class="sh" onclick="tog('${cid}')" data-pk="${p.key}" data-i="${i}">
        <div class="sdot" style="background:${s.color}"></div>
        <span class="sname">${s.name}</span>
        <span class="scnt">${fmt(s.count)}</span>
        <span class="schev">▶</span>
      </div>
      <div class="sb">
        <div class="fl">Rationale</div><div class="fv">${s.rat}</div>
        <div class="fl">Entry criteria</div><div class="fv">${s.criteria}</div>
        <div class="fl">Exit conditions</div><div class="fv">${s.excl}</div>
        ${pairsHtml}
        <div class="fr">
          <a class="ilink" href="https://app.iterable.com/segmentation?emailListId=${s.id}" target="_blank">List ${s.id} ↗</a>
        </div>
      </div>
    </div>`;
  }).join('');

  const covHtml=p.coverage?`<div class="cov-wrap">
    <div class="cov-l">Coverage check: <strong>${p.coverage.name}</strong> (List ${p.coverage.id})</div>
    <div class="cov-r"><span class="badge" style="background:var(--green-bg);color:var(--green)">✓ ${fmt(p.coverage.count)} users — complete coverage</span><a class="ilink" href="https://app.iterable.com/segmentation?emailListId=${p.coverage.id}" target="_blank">List ↗</a></div>
  </div>`:'';

  return metrics+dbar+leg+`<div class="stages">${cards}</div>`+covHtml+renderQA(p);
}

function switchTab(key){
  PRODUCTS.forEach(p=>{
    const el=document.getElementById('p-'+p.key);
    if(el)el.style.display=p.key===key?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',PRODUCTS[i].key===key));
}

/* ── Init ── */
document.getElementById('tabs').innerHTML=PRODUCTS.map((p,i)=>
  `<button class="tab${i===0?' active':''}" onclick="switchTab('${p.key}')">${p.name}</button>`
).join('');

document.getElementById('panels').innerHTML=PRODUCTS.map((p,i)=>
  `<div id="p-${p.key}" style="display:${i===0?'block':'none'}">${render(p)}</div>`
).join('');

/* ── Hover events (after render) ── */
document.querySelectorAll('.ds,.sh').forEach(el=>{
  el.addEventListener('mouseenter',e=>{
    const p=PRODUCTS.find(x=>x.key===el.dataset.pk);
    if(!p)return;
    const total=p.stages.reduce((s,x)=>s+x.count,0);
    showTT(e,p.stages[+el.dataset.i],total);
  });
  el.addEventListener('mouseleave',hideTT);
});
</script>
</body>
</html>
